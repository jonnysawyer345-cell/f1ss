<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ticket Mockup</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
}

.ticket{
    background:#5a2ca0;
    color:white;
    width:350px;
    margin:40px auto;
    padding:30px 20px;
    text-align:center;
    border-radius:10px;
}

.ticket h1{
    font-size:28px;
    margin-bottom:20px;
}

.ticket h2{
    font-weight:normal;
    margin:10px 0;
}

.code{
    font-size:26px;
    letter-spacing:2px;
    margin:20px 0;
}

.barcode{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.barcode img{
    width:100%;
}

.info{
    margin-top:20px;
    text-align:left;
    font-size:14px;
}
</style>
</head>

<body>

<div class="ticket">
    <h1>General Admission</h1>

    <h2>Child 3-14 Years</h2>

    <div class="code">GA0122</div>

    <div class="barcode">
        <!-- fake barcode image -->
        <img src="https://barcode.tec-it.com/barcode.ashx?data=GA0122&code=Code128">
    </div>

    <div class="info">
        <p><b>Entrance:</b> Park Pass</p>
        <p><b>Information:</b> General Admission</p>
    </div>
</div>

</body>
</html>
