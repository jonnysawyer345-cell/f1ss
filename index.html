<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Full Screen Photo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* fills screen without stretching */
      display: block;
    }
  </style>
</head>
<body>

  <img src="IMG_1531.jpeg" alt="photo">

  <img src="IMG_1535.png" alt="photo"

</body>
</html>
