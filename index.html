<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
    }

    .screen {
        width: 100vw;
        height: 100vh;
        object-fit: cover; /* no stretching */
        display: block;
    }

    /* Button on top of the FIRST screenshot */
    #goBtn {
        position: absolute;
        bottom: 200px; /* adjust to match your screenshot */
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 22px;
        background: rgba(255,255,255,0.9);
        border-radius: 12px;
        border: none;
        font-size: 16px;
        cursor: pointer;
    }

    .wrapper {
        position: relative;
    }
</style>
</head>
<body>

    <!-- FIRST screenshot with button on it -->
    <div class="wrapper">
        <img src="WAI-C.png" class="screen">
        <button id="goBtn" onclick="window.location.href='page2.html'">
           view
        </button>
    </div>

    <!-- SECOND screenshot under it -->
    <img src="IMG_1535.png" class="screen">

</body>
</html>
